<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>滑动验证码</title>
    <link rel="stylesheet" href="<?= $cssUrl ?>">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .captcha-wrapper {
            text-align: center;
        }
        .captcha-container {
            position: relative;
            width: 300px;
            height: 190px;
            border: 1px solid #ccc;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .captcha-bg {
            width: 300px;
            height: 150px;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        .captcha-block {
            position: absolute;
            left: 0;
            top: 0;
            cursor: grab;
            z-index: 10;
            border: none;
            margin: 0;
            padding: 0;
            display: none;
        }
        .captcha-block:active {
            cursor: grabbing;
        }
        .captcha-slider {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #f5f5f5;
            border-top: 1px solid #eee;
        }
        .slider-handle {
            width: 40px;
            height: 100%;
            background: #409eff;
            color: white;
            text-align: center;
            line-height: 40px;
            cursor: grab;
            position: absolute;
            font-size: 16px;
            border-radius: 2px;
        }
        .slider-handle:active {
            cursor: grabbing;
        }
        .status {
            margin-top: 20px;
            text-align: center;
            color: #666;
            height: 24px;
            transition: all 0.3s ease;
        }
        .success {
            color: #67c23a;
            font-weight: bold;
        }
        .error {
            color: #f56c6c;
            font-weight: bold;
        }
        .reloading {
            color: #e6a23c;
            font-weight: bold;
        }
        .reload-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .reload-btn:hover {
            background: #66b1ff;
        }
        .reload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading-indicator {
            display: inline-block;
            margin-left: 8px;
        }
        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #e6a23c;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="captcha-wrapper">
        <div class="captcha-container">
            <img class="captcha-bg" src="" alt="验证码背景">
            <img class="captcha-block" src="" alt="验证码块" style="display: none;">
            <div class="captcha-slider">
                <div class="slider-handle">👉</div>
            </div>
        </div>
        <div class="status">请拖动滑块完成拼图</div>
        <button class="reload-btn" style="display: none;">点击重新加载</button>
    </div>
    <script src="<?= $jsUrl ?>"></script>
    <script>
        const statusEl = document.querySelector(".status");
        const reloadBtn = document.querySelector(".reload-btn");

        initSlideCaptacle({
            token: "<?= $token ?>",
            apiUrl: "<?= $apiPath ?>",
            onSuccess: function() {
                statusEl.textContent = "✅ 验证成功！";
                statusEl.className = "status success";
                reloadBtn.style.display = "inline-block";
                reloadBtn.disabled = false;
            },
            onError: function(msg) {
                statusEl.className = "status error";
                statusEl.innerHTML = "❌ " + (msg || "验证失败") + "，正在自动重新获取... <span class=\"loading-indicator\"><span class=\"loading-spinner\"></span></span>";
                reloadBtn.disabled = true;
                reloadBtn.style.display = "inline-block";

                setTimeout(() => {
                    if (statusEl.className.includes("error")) {
                        statusEl.className = "status reloading";
                        statusEl.innerHTML = "🔄 正在获取新验证码... <span class=\"loading-indicator\"><span class=\"loading-spinner\"></span></span>";
                    }
                }, 1500);

                setTimeout(() => {
                    statusEl.className = "status";
                    statusEl.textContent = "请拖动滑块完成拼图";
                    reloadBtn.disabled = false;
                }, 2000);
            }
        });
    </script>
</body>
</html>
