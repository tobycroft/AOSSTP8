<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>滑动拼图验证码演示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .captcha-container {
            position: relative;
            width: 300px;
            /* ✅ 容器总高度 = 图片高度(150px) + 滑块高度(40px)，避免滑块遮挡图片 */
            height: 190px;
            border: 1px solid #ccc;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .captcha-bg {
            /* 图片只占容器上部 */
            width: 300px;
            height: 150px;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        .captcha-block {
            position: absolute;
            left: 0;
            /* 拼图块位于图片区域内，不会被下方滑块遮挡 */
            top: 0;
            cursor: grab;
            z-index: 10;
        }
        .captcha-block:active {
            cursor: grabbing;
        }
        .captcha-slider {
            position: absolute;
            /* 滑块位于图片下方 */
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #f5f5f5;
            border-top: 1px solid #eee;
        }
        .slider-handle {
            width: 40px;
            height: 100%;
            background: #409eff;
            color: white;
            text-align: center;
            line-height: 40px;
            cursor: grab;
            position: absolute;
            font-size: 16px;
            border-radius: 2px;
        }
        .slider-handle:active {
            cursor: grabbing;
        }
        .status {
            margin-top: 20px;
            text-align: center;
            color: #666;
            height: 24px;
            transition: all 0.3s ease;
        }
        .success {
            color: #67c23a;
            font-weight: bold;
        }
        .error {
            color: #f56c6c;
            font-weight: bold;
        }
        .reloading {
            color: #e6a23c;
            font-weight: bold;
        }
        .reload-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .reload-btn:hover {
            background: #66b1ff;
        }
        .reload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading-indicator {
            display: inline-block;
            margin-left: 8px;
        }
        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #e6a23c;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .container-wrapper {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <div class="captcha-container">
            <img class="captcha-bg" src="" alt="验证码背景">
            <img class="captcha-block" src="" alt="验证码块" style="display: none;">
            <div class="captcha-slider">
                <div class="slider-handle">👉</div>
            </div>
        </div>
        <div class="status">请拖动滑块完成拼图</div>
        <button class="reload-btn" style="display: none;">点击重新加载</button>
    </div>

    <script src="slide.js"></script>
    <script>
        const statusEl = document.querySelector('.status');
        const reloadBtn = document.querySelector('.reload-btn');

        // 初始化验证码 - 手动按钮逻辑已集成到 slide.js 中
        // 自动重新获取和手动按钮使用完全相同的 generateCaptcha 逻辑
        initSlideCaptacle({
            token: 'your-project-token',
            onSuccess: function() {
                statusEl.textContent = '✅ 验证成功！';
                statusEl.className = 'status success';
                reloadBtn.style.display = 'inline-block';
                reloadBtn.disabled = false;
            },
            onError: function(msg) {
                statusEl.className = 'status error';
                statusEl.innerHTML = `❌ ${msg || '验证失败'}，正在自动重新获取... <span class="loading-indicator"><span class="loading-spinner"></span></span>`;
                reloadBtn.disabled = true;
                reloadBtn.style.display = 'inline-block';

                // 1.5秒后显示正在加载新验证码
                setTimeout(() => {
                    if (statusEl.className.includes('error')) {
                        statusEl.className = 'status reloading';
                        statusEl.innerHTML = `🔄 正在获取新验证码... <span class="loading-indicator"><span class="loading-spinner"></span></span>`;
                    }
                }, 1500);

                // 2秒后重置状态
                setTimeout(() => {
                    statusEl.className = 'status';
                    statusEl.textContent = '请拖动滑块完成拼图';
                    reloadBtn.disabled = false;
                }, 2000);
            }
        });
    </script>
</body>
</html>
