<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>滑动拼图验证码演示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .captcha-container {
            position: relative;
            width: 300px;
            height: 150px;
            border: 1px solid #ccc;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .captcha-bg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .captcha-block {
            position: absolute;
            left: 0;
            top: 0;
            cursor: grab;
        }
        .captcha-block:active {
            cursor: grabbing;
        }
        .captcha-slider {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #f5f5f5;
            border-top: 1px solid #eee;
        }
        .slider-handle {
            width: 40px;
            height: 100%;
            background: #409eff;
            color: white;
            text-align: center;
            line-height: 40px;
            cursor: grab;
            position: absolute;
            font-size: 16px;
            border-radius: 2px;
        }
        .slider-handle:active {
            cursor: grabbing;
        }
        .status {
            margin-top: 20px;
            text-align: center;
            color: #666;
        }
        .success {
            color: #67c23a;
        }
        .error {
            color: #f56c6c;
        }
        .reload-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .reload-btn:hover {
            background: #66b1ff;
        }
    </style>
</head>
<body>
    <div>
        <div class="captcha-container">
            <img class="captcha-bg" src="" alt="验证码背景">
            <img class="captcha-block" src="" alt="验证码块" style="display: none;">
            <div class="captcha-slider">
                <div class="slider-handle">👉</div>
            </div>
        </div>
        <div class="status">请拖动滑块完成拼图</div>
        <button class="reload-btn" style="display: none;">重新加载</button>
    </div>

    <script src="slide.js"></script>
    <script>
        // 初始化验证码
        initSlideCaptacle({
            token: 'your-project-token',
            onSuccess: function() {
                document.querySelector('.status').textContent = '验证成功！';
                document.querySelector('.status').className = 'status success';
            },
            onError: function(msg) {
                document.querySelector('.status').textContent = msg || '验证失败，请重试';
                document.querySelector('.status').className = 'status error';
            }
        });

        // 重新加载按钮
        document.querySelector('.reload-btn').addEventListener('click', function() {
            initSlideCaptacle({
                token: 'your-project-token',
                onSuccess: function() {
                    document.querySelector('.status').textContent = '验证成功！';
                    document.querySelector('.status').className = 'status success';
                },
                onError: function(msg) {
                    document.querySelector('.status').textContent = msg || '验证失败，请重试';
                    document.querySelector('.status').className = 'status error';
                }
            });
            document.querySelector('.status').textContent = '请拖动滑块完成拼图';
            document.querySelector('.status').className = 'status';
        });
    </script>
</body>
</html>
